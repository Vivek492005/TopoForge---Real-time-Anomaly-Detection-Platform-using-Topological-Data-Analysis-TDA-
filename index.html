<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopoForge | Topological Anomaly Detection Platform</title>
    <meta name="description" content="TopoForge uses persistent homology and topological data analysis to detect structural anomalies in complex, high-dimensional data." />

    <meta property="og:title" content="TopoForge | Detect Anomalies by Shape" />
    <meta property="og:description" content="Production-ready TDA platform for anomaly detection in cybersecurity, financial systems, and IoT." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#0a0f1a" />
  </head>

  <body class="dark">
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; background: #fff; z-index: 9999; position: relative;">' + 
          '<h3>Global Error</h3>' +
          '<p><strong>Message:</strong> ' + message + '</p>' +
          '<p><strong>Source:</strong> ' + source + ':' + lineno + ':' + colno + '</p>' +
          '<p><strong>Error:</strong> ' + (error ? error.stack : 'N/A') + '</p>' +
          '</div>';
      };
      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color: darkred; padding: 20px; font-family: monospace; background: #fff; z-index: 9999; position: relative;">' + 
          '<h3>Unhandled Promise Rejection</h3>' +
          '<p><strong>Reason:</strong> ' + (event.reason ? event.reason.stack || event.reason : 'Unknown') + '</p>' +
          '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
